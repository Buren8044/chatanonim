<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
  <title>Instagram Direct</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #000;
      --bg2: #121212;
      --bg3: #1c1c1e;
      --txt: #f5f5f5;
      --txt2: #a8a8a8;
      --txt3: #737373;
      --border: #262626;
      --accent: #0095f6;
      --sent: #3797f0;
      --sent-grad: linear-gradient(135deg,#f09433 0%,#e6683c 20%,#dc2743 45%,#cc2366 70%,#bc1888 100%);
      --chat-bg-grad: radial-gradient(circle at 15% 0%, rgba(188,24,136,0.35) 0%, rgba(188,24,136,0) 55%),
                      radial-gradient(circle at 85% 100%, rgba(64,93,230,0.35) 0%, rgba(64,93,230,0) 55%),
                      linear-gradient(160deg,#18041a 0%,#0b0014 50%,#050010 100%);
      --recv: rgba(255,255,255,0.08);
      --online: #00d97e;
      --offline: #6b7280;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--txt);
    }

    /* ── APP SHELL ── */
    #app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── SCREENS ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }

    #inbox  { transform: translateX(0); }
    #chat   { transform: translateX(100%); }

    #app.chat-open #inbox { transform: translateX(-30%); }
    #app.chat-open #chat  { transform: translateX(0); }

    /* ── STATUS BAR SPACER ── */
    .status-bar {
      height: env(safe-area-inset-top, 44px);
      min-height: 44px;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       INBOX SCREEN
    ───────────────────────────────────────── */
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 8px;
      flex-shrink: 0;
    }

    .inbox-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .inbox-title svg { width: 14px; height: 14px; fill: var(--txt); margin-top: 2px; }

    .inbox-profile-pp {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 8px;
      border: 1px solid var(--border);
      display: none;
    }
    .inbox-profile-pp.visible { display: block; }

    .hdr-btn {
      background: none;
      border: none;
      color: var(--txt);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      border-radius: 50%;
    }
    .hdr-btn:active { background: var(--bg3); }

    /* Requests row */
    .requests-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      min-height: 64px;
      cursor: pointer;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .requests-row:active { background: var(--bg2); }

    .req-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .req-avatars {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .req-av {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      border: 2px solid var(--bg);
      position: absolute;
    }
    .req-av:first-child { top: 0; left: 0; z-index: 2; }
    .req-av:last-child  { bottom: 0; right: 0; z-index: 1; }

    .req-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .req-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--txt);
    }

    .req-sub {
      font-size: 12px;
      color: var(--txt3);
    }

    /* Story row */
    .story-row {
      display: flex;
      gap: 18px;
      padding: 8px 16px 12px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .story-row::-webkit-scrollbar { display: none; }

    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .story-ring {
      padding: 2px;
      border-radius: 50%;
      background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    }
    .story-ring.no-story { background: var(--bg3); }

    .story-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 20px; color: #fff;
      border: 2px solid var(--bg);
    }

    .story-name {
      font-size: 11px; color: var(--txt2);
      max-width: 60px; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Conversations */
    .conv-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .conv-list::-webkit-scrollbar { display: none; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.12s;
      -webkit-user-select: none;
      user-select: none;
    }
    .conv-item:active { background: rgba(255,255,255,0.04); }

    .ci-avatar-wrap { position: relative; flex-shrink: 0; }

    .ci-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 24px; color: #fff;
      position: relative; z-index: 1;
    }

    .ci-story-ring {
      position: absolute; inset: -2px; border-radius: 50%;
      border: 2px solid transparent;
    }
    .ci-story-ring.active {
      border: 2px solid transparent;
      background: linear-gradient(var(--bg),var(--bg)) padding-box,
                  linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888) border-box;
    }

    .ci-online {
      width: 15px; height: 15px;
      background: var(--offline);
      border: 2.5px solid var(--bg);
      border-radius: 50%;
      position: absolute; bottom: 1px; right: 1px;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .ci-online.online {
      background: var(--online);
      box-shadow: 0 0 0 3px rgba(0,217,126,0.2);
    }

    .ci-info { flex: 1; min-width: 0; }

    .ci-name {
      font-size: 14px; font-weight: 400;
      margin-bottom: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--txt);
    }

    .ci-last {
      font-size: 14px; color: var(--txt2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-weight: 400;
    }
    .ci-last.bold { color: var(--txt); font-weight: 600; }

    .ci-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }

    .ci-time { font-size: 12px; color: var(--txt3); }

    .ci-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* ─────────────────────────────────────────
       CHAT SCREEN
    ───────────────────────────────────────── */
    .chat-header {
      display: flex;
      align-items: center;
      padding: 4px 6px 8px;
      gap: 4px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .back-btn {
      background: none; border: none; color: var(--txt);
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
    }
    .back-btn:active { background: var(--bg3); }

    .ch-avatar-wrap {
      position: relative; flex-shrink: 0; cursor: pointer; margin-right: 4px;
    }

    .ch-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
      position: relative; z-index: 1;
    }

    .ch-story-ring {
      position: absolute; inset: -2px; border-radius: 50%; pointer-events: none;
      border: 2px solid transparent;
      background: linear-gradient(var(--bg),var(--bg)) padding-box,
                  linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888) border-box;
    }

    .ch-online {
      width: 12px; height: 12px;
      background: var(--offline);
      border: 2px solid #0a0012;
      border-radius: 50%;
      position: absolute; bottom: 0; right: 0;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .ch-online.online {
      background: var(--online);
      box-shadow: 0 0 0 3px rgba(0,217,126,0.25), 0 0 8px rgba(0,217,126,0.55);
    }

    .ch-info { flex: 1; min-width: 0; cursor: pointer; }

    .ch-name {
      font-size: 15px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.2;
      letter-spacing: -0.1px;
    }

    .ch-status { font-size: 12px; color: var(--txt2); line-height: 1.3; margin-top: 1px; }

    .ch-actions { display: flex; gap: 0; }

    .ch-btn {
      background: none; border: none; color: var(--txt);
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
    }
    .ch-btn:active { background: var(--bg3); }

    /* Messages */
    .msgs {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 10px 4px;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg-grad);
      background-attachment: fixed;
      overscroll-behavior: contain;
    }
    #chat { background: var(--chat-bg-grad); }
    #chat .chat-header {
      background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #chat .input-bar {
      background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.7));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .msgs::-webkit-scrollbar { display: none; }

    .time-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--txt2);
      margin: 14px 0 10px;
      flex-shrink: 0;
      letter-spacing: -0.1px;
    }

    .msg-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 4px;
    }
    .msg-group.sent  { align-items: flex-end; }
    .msg-group.recv  { align-items: flex-start; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-group + .msg-group { margin-top: 6px; }
    .msg-group.sent .msg-row { flex-direction: row-reverse; }
    .msg-row.msg-enter { animation: msgSlideIn 0.22s ease-out; }

    .mini-av {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .mini-av.hide { visibility: hidden; }

    .bubble {
      max-width: 75%;
      padding: 9px 13px;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: -0.1px;
      word-break: break-word;
    }
    .msg-time {
      display: block;
      font-size: 10px;
      opacity: 0.6;
      margin-top: 3px;
      line-height: 1;
      letter-spacing: 0.2px;
    }
    .msg-group.sent .msg-time { color: rgba(255,255,255,0.8); text-align: right; }
    .msg-group.recv .msg-time { color: rgba(255,255,255,0.5); }

    @keyframes msgSlideIn {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .msg-group.sent .bubble {
      background: var(--sent-grad);
      color: #fff;
      border-radius: 22px;
      box-shadow: 0 2px 10px rgba(220,39,67,0.25);
    }
    .msg-group.sent .msg-row:last-child .bubble {
      border-radius: 22px 22px 4px 22px;
    }
    .msg-group.sent .msg-row:not(:last-child) .bubble {
      border-radius: 22px 4px 4px 22px;
    }
    .msg-group.sent .msg-row:first-child .bubble {
      border-radius: 22px 22px 4px 22px;
    }
    .msg-group.sent .msg-row:only-child .bubble {
      border-radius: 22px;
    }

    .msg-group.recv .bubble {
      background: rgba(255,255,255,0.1);
      color: var(--txt);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg-group.recv .msg-row:not(:last-child) .bubble {
      border-radius: 4px 22px 22px 4px;
    }
    .msg-group.recv .msg-row:first-child .bubble {
      border-radius: 22px 22px 22px 4px;
    }
    .msg-group.recv .msg-row:only-child .bubble {
      border-radius: 22px;
    }

    .seen-row {
      display: flex;
      justify-content: flex-end;
      padding-right: 4px;
      margin-top: 3px;
      margin-bottom: 4px;
    }
    .seen-txt {
      font-size: 11px;
      color: var(--txt2);
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    /* ── SYSTEM_TERMINATED UYARI KUTUSU ── */
    @keyframes warningBlink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }
    @keyframes warningAppear {
      from { transform: translateY(18px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    .system-terminated-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 14px;
      animation: warningAppear 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .system-terminated-box {
      width: 100%;
      max-width: 340px;
      background: rgba(10,2,2,0.82);
      border: 1.5px solid rgba(255,50,50,0.75);
      border-radius: 14px;
      padding: 16px 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 24px rgba(255,30,30,0.25), inset 0 0 20px rgba(255,0,0,0.05);
      text-align: center;
    }

    .sys-term-icon {
      font-size: 22px;
      display: block;
      margin-bottom: 8px;
      animation: warningBlink 1.2s ease-in-out infinite;
    }

    .sys-term-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #ff4444;
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: warningBlink 1.2s ease-in-out infinite;
    }

    .sys-term-body {
      font-size: 13px;
      font-weight: 500;
      color: #f5c6c6;
      line-height: 1.55;
    }

    .sys-term-footer {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(255,80,80,0.55);
      letter-spacing: 0.5px;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .typing-dots {
      background: var(--recv);
      border-radius: 22px 22px 22px 4px;
      padding: 11px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--txt2);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 6px 10px 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      background: var(--bg);
    }

    .ib-btn {
      background: none; border: none; color: var(--txt);
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; min-width: 44px; min-height: 44px;
    }
    .ib-btn:active { background: var(--bg3); }
    .ib-cam {
      background: #3797f0;
      min-width: 34px; min-height: 34px;
      width: 34px; height: 34px;
      align-self: center;
      margin: 0 2px;
    }
    .ib-cam:active { background: #1f7ed8; }

    .ib-field {
      flex: 1;
      display: flex;
      align-items: center;
      background: transparent;
      border: 1px solid #363636;
      border-radius: 22px;
      padding: 0 12px;
      gap: 8px;
      min-height: 44px;
      transition: border-color 0.15s;
    }
    .ib-field:focus-within { border-color: #545454; }

    .ib-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--txt); font-size: 15px; font-family: var(--font);
      resize: none; max-height: 90px; line-height: 1.4;
      padding: 0; align-self: center;
    }
    .ib-input::placeholder { color: var(--txt3); }

    .ib-emoji {
      background: none; border: none; font-size: 20px;
      cursor: pointer; flex-shrink: 0; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
    }

    .ib-send {
      background: none; border: none; color: var(--accent);
      font-size: 15px; font-weight: 700; font-family: var(--font);
      cursor: pointer; flex-shrink: 0; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px;
    }
    .ib-send:active { background: var(--bg3); }

    /* ── EMOJI PICKER ── */
    .emoji-picker {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #1c1c1e;
      border-top: 1px solid #333;
      border-radius: 16px 16px 0 0;
      height: 320px;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }
    .emoji-picker.open { transform: translateY(0); }

    .emoji-cats {
      display: flex;
      padding: 8px 4px 0;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      overflow-x: auto;
    }
    .emoji-cats::-webkit-scrollbar { display: none; }

    .ecat-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; padding: 6px 10px; border-radius: 8px;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0; min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .ecat-btn.active { border-bottom: 2px solid var(--accent); }
    .ecat-btn:active { background: #333; }

    .emoji-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      padding: 6px 4px;
      gap: 2px;
      align-content: start;
    }
    .emoji-grid::-webkit-scrollbar { display: none; }

    .eg-btn {
      background: none; border: none; cursor: pointer;
      font-size: 24px; line-height: 1;
      padding: 4px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      min-height: 40px;
    }
    .eg-btn:active { background: #333; }

    /* ─── Kamera modalı (fotoğraf çekme) ─── */
    .cam-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center; justify-content: center;
      z-index: 99999;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .cam-modal.active { display: flex; animation: camFade .2s ease; }
    @keyframes camFade { from { opacity: 0; } to { opacity: 1; } }
    .cam-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 18px;
      width: min(92vw, 480px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; gap: 14px;
    }
    .cam-title {
      color: #fff; font-size: 15px; font-weight: 600;
      text-align: center; letter-spacing: .2px;
    }
    .cam-video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }
    .cam-video-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: none;

/* ── Firebase referans helper ──
   istekler/  → istekler/{musteriId}/...  (müşteriye özel)
   musteriler/ config → musteriler/{musteriId}/config/...
   sohbetler/ → chatId globally unique, prefix gerekmez */
function getRef(path) {
    const id = window.CURRENT_MUSTERI_ID;
    if (path === 'istekler')                      return db.ref(`istekler/${id}`);
    if (path.startsWith('istekler/'))             return db.ref(`istekler/${id}/${path.slice(9)}`);
    if (path === 'config/musteri_push_token')     return db.ref(`musteriler/${id}/config/push_token`);
    return db.ref(path);
}

function sendNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body });
  } catch (err) {

function playSendSound() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.07);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.07);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function playReceiveSound() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    [660, 880].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.1;
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.14, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.26);
    });
  } catch(e) {}
}

function _tabStartFlash() {
  if (_tabFlashTimer) return;
  let show = true;
  _tabFlashTimer = setInterval(() => {
    document.title = show ? `(${_tabUnread}) Yeni Mesaj!` : _tabOrigTitle;
    show = !show;
  }, 1000);
}

function _tabStop() {
  clearInterval(_tabFlashTimer);
  _tabFlashTimer = null;
  _tabUnread = 0;
  document.title = _tabOrigTitle;
}

function notifyTabNewMsg() {
  if (!document.hidden) return;
  _tabUnread++;
  _tabStartFlash();
}

  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.13);
  } catch (err) {
    console.error('Pop sesi calma hatasi:', err);
  }
}

async function _registerFcmToken() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const sw = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    _fcmMessaging = firebase.messaging();
    const token = await _fcmMessaging.getToken({ vapidKey: FCM_VAPID_KEY, serviceWorkerRegistration: sw });
    if (token) await getRef('config/musteri_push_token').set(token);
    _fcmMessaging.onMessage(payload => {
      const title = payload.notification?.title || 'Yeni Bildirim';
      const body  = payload.notification?.body  || '';
      sendNotification(title, body);
    });
  } catch (err) {
    console.error('FCM token hatasi:', err);
  }
}

async function initNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    await _registerFcmToken();
    return;
  }
  if (Notification.permission === 'denied') return;
  try {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') await _registerFcmToken();
  } catch (err) {
    console.error('Bildirim izin hatasi (musteri):', err);
  }
}

let currentCat = 0;

function buildEmojiPicker() {
  const cats = document.getElementById('emojiCats');
  emojiData.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'ecat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = c.cat;
    btn.title = c.label;
    btn.onclick = () => selectCat(i);
    cats.appendChild(btn);
  });
  renderEmojis(0);
}

function selectCat(i) {
  currentCat = i;
  document.querySelectorAll('.ecat-btn').forEach((b, idx) =>
    b.classList.toggle('active', idx === i));
  renderEmojis(i);
}

function renderEmojis(i) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  emojiData[i].emojis.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'eg-btn';
    btn.textContent = e;
    btn.onclick = () => insertEmoji(e);
    grid.appendChild(btn);
  });
  grid.scrollTop = 0;
}

function insertEmoji(e) {
  const inp = document.getElementById('ibInput');
  const start = inp.selectionStart;
  const end   = inp.selectionEnd;
  inp.value = inp.value.slice(0, start) + e + inp.value.slice(end);
  inp.selectionStart = inp.selectionEnd = start + e.length;
  inp.dispatchEvent(new Event('input'));
  inp.focus();
}

let emojiOpen = false;
function toggleEmoji() {
  emojiOpen = !emojiOpen;
  document.getElementById('emojiPicker').classList.toggle('open', emojiOpen);
  if (emojiOpen) {
    document.getElementById('ibInput').blur();
    const msgs = document.getElementById('msgs');
    if (msgs) setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
  } else {
    document.getElementById('ibInput').focus();
  }
}

function buildInbox() {
  document.getElementById('storyRow').innerHTML = '';
  renderApprovedDmList();
}

function renderRealtimeRequest(userId, reqData) {
    const safeName = reqData?.name || `kullanici_${userId.slice(-4)}`;
    const prevMsgs = requestPeople[userId]?.msgs || [];
    const rawStatus = reqData?.status || 'bekliyor';
    const chatId = reqData?.chatId || `chat_${userId}`;

    let viewStatus = 'Istek bekliyor';
    if (rawStatus === 'onaylandi') viewStatus = 'Onaylandi';
    if (rawStatus === 'reddedildi') viewStatus = 'Reddedildi';

    requestPeople[userId] = {
        userId,
        name: safeName,
        init: reqData?.avatarEmoji || '🎭',
        online: requestPeople[userId]?.online || false,
        story: true,
        grad: reqData?.avatarGrad || 'linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)',
        chatId,
        rawStatus,
        status: viewStatus,
        lastMsg: rawStatus === 'onaylandi' ? 'Istek onaylandi' : 'Mesaj istegi bekliyor',
        msgs: prevMsgs,
        msgKeys: requestPeople[userId]?.msgKeys || new Set(),
        lastSentAt: requestPeople[userId]?.lastSentAt || 0,
        seenByKullaniciAt: requestPeople[userId]?.seenByKullaniciAt || 0,

        // ── YENİ: IP, ŞEHİR VE CİHAZ BİLGİLERİ ──
        clientIP: reqData?.clientIP || null,
        clientCity: reqData?.clientCity || null,
        clientDistrict: reqData?.clientDistrict || null,
        clientCountry: reqData?.clientCountry || null,
        clientDevice: reqData?.clientDevice || null
    };
}

function listenRequests() {
  getRef('istekler').on('value', snap => {
    const data = snap.val() || {};
    Object.keys(requestPeople).forEach(id => {
      if (!data[id]) delete requestPeople[id];
    });
    Object.keys(data).forEach(userId => {
      renderRealtimeRequest(userId, data[userId]);
    });
    renderApprovedDmList();
    renderRequestsPanelList();
    updateRequestCount();
  });
}

function startRequestNotifications() {
  const requestsRef = getRef('istekler');
  requestsRef.once('value').then(snap => {
    const existing = snap.val() || {};
    Object.keys(existing).forEach(id => knownRequestIds.add(id));
  }).catch(err => console.error('Istek preload hatasi:', err))
  .finally(() => {
    const handler = requestsRef.on('child_added', snap => {
      const userId = snap.key;
      const data = snap.val() || {};
      if (knownRequestIds.has(userId)) return;
      knownRequestIds.add(userId);
      sendNotification('Yeni Sohbet Istegi', `${data.name || 'Yeni kullanici'} size istek gonderdi.`);
      playPopSound();
    }, err => {
      console.error('Istek bildirim dinleme hatasi:', err);
    });
    requestChildUnsub = () => requestsRef.off('child_added', handler);
  });
}

function updateRequestCount() {
  const pendingCount = Object.values(requestPeople).filter(p => p.rawStatus === 'bekliyor').length;
  const sub = document.getElementById('requestsSub');
  if (!sub) return;
  sub.textContent = pendingCount > 0
    ? `${pendingCount} bekleyen istek var`
    : 'Bekleyen istek yok';
}

function renderApprovedDmList() {
  const cl = document.getElementById('convList');
  if (!cl) return;

  const approved = Object.values(requestPeople).filter(p => p.rawStatus === 'onaylandi');
  if (!approved.length) {
    cl.innerHTML = `<div style="padding:20px 16px;color:#a8a8a8;font-size:13px;">Henüz onaylanmış mesaj yok.</div>`;
    return;
  }

  cl.innerHTML = approved.map(p => `
    <div class="conv-item"
      onmousedown="startDmLongPress('${p.userId}')"
      onmouseup="cancelDmLongPress()"
      onmouseleave="cancelDmLongPress()"
      ontouchstart="startDmLongPress('${p.userId}')"
      ontouchend="cancelDmLongPress()"
      onclick="openRequestChat('${p.userId}')">

      <div class="ci-avatar-wrap">
        <div class="ci-avatar" style="background:${p.grad}">${p.init}</div>
        <div class="ci-story-ring active"></div>
        <div class="ci-online${p.online ? ' online' : ''}"></div>
      </div>

      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-last">${p.lastMsg || 'Sohbet başladı'}</div>
      </div>

      <div class="ci-meta" style="display:flex; align-items:center; gap:10px;">
        <span class="ci-time">Şimdi</span>
      </div>
    </div>
  `).join('');
}

function openRequestsPanel() {
  renderRequestsPanelList();
  document.getElementById('requestsPanel').style.display = 'block';
}

function closeRequestsPanel() {
  document.getElementById('requestsPanel').style.display = 'none';
}

function renderRequestsPanelList() {
    const list = document.getElementById('requestsList');
    if (!list) return;

    const pending = Object.values(requestPeople).filter(p => p.rawStatus === 'bekliyor');
    if (!pending.length) {
        list.innerHTML = `<div style="padding:14px;color:#a8a8a8;font-size:13px;">Bekleyen mesaj isteği yok.</div>`;
        return;
    }

    list.innerHTML = pending.map(p => `
        <div class="conv-item" style="border-radius:12px;" onclick="openRequestChat('${p.userId}')">
            <div class="ci-avatar-wrap">
                <div class="ci-avatar" style="background:${p.grad}">${p.init}</div>
            </div>
            <div class="ci-info">
                <div class="ci-name">${p.name}</div>
                <div class="ci-last">Mesaj isteği bekliyor</div>

                <!-- CİHAZ BİLGİSİ (IP ve şehir gizli olsa bile göster) -->
                <div style="margin-top:8px; padding:6px 10px; background:#1f1f1f; border-radius:8px; font-size:12px; color:#aaa; line-height:1.4;">
                    📱 <strong>Cihaz:</strong> ${p.clientDevice || 'Bilinmiyor'}<br>
                    📍 ${(p.clientDistrict && p.clientCity && !p.clientCity.includes(p.clientDistrict)) ? (p.clientDistrict + ' / ' + p.clientCity) : (p.clientCity || 'Gizli')} ${p.clientCountry ? `(${p.clientCountry})` : ''}<br>
                    🌐 <strong>IP:</strong> ${p.clientIP || 'Gizli'}
                </div>
            </div>

            <button class="ib-send" style="min-width:auto;min-height:auto;padding:8px 12px;" onclick="event.stopPropagation();approveFromPanel('${p.userId}')">Kabul Et</button>
            <button class="ib-send" style="min-width:auto;min-height:auto;padding:8px 12px;color:#f87171;" onclick="event.stopPropagation();rejectFromPanel('${p.userId}')">Reddet</button>
        </div>
    `).join('');
}

function approveFromPanel(userId) {
  markRequestApproved(userId).then(() => {
    closeRequestsPanel();
  }).catch(err => {
    console.error('Onay guncellenemedi:', err);
  });
}

function rejectFromPanel(userId) {
  markRequestRejected(userId).catch(err => {
    console.error('Red guncellenemedi:', err);
  });
}

function openRequestChat(userId) {
  if (dmLongPressTriggered) {
    dmLongPressTriggered = false;
    return;
  }
  const p = requestPeople[userId];
  if (!p) return;
  currentRequestUserId = userId;
  activeChatId = p.chatId || `chat_${userId}`;
  currentIdx = -1;
  typingApprovalSentFor = '';
  lastTypingState = false;
  clearTypingResetTimer();
  setTypingState(false);

  document.getElementById('chAvatar').textContent = p.init;
  document.getElementById('chAvatar').style.background = p.grad;
  document.getElementById('chName').textContent = p.name;
  const chOnlineEl = document.getElementById('chOnline');
  chOnlineEl.classList.remove('online');
  chOnlineEl.style.display = 'block';
  document.getElementById('chStatus').textContent = p.status === 'Onaylandi' ? 'Çevrimdışı' : 'Istek bekliyor';
  document.getElementById('chRing').style.display = 'block';

  renderMsgs(p.msgs);
  startChatListener(activeChatId, userId);
  document.getElementById('app').classList.add('chat-open');
  const inp = document.getElementById('ibInput');
  inp.value = '';
  inp.style.height = 'auto';
  resetSendIcon();
  closeEmoji();
}

function markRequestApproved(userId) {
  if (!userId) return Promise.resolve();
  const chatId = (requestPeople[userId]?.chatId) || `chat_${userId}`;
  if (requestPeople[userId]) {
    requestPeople[userId].chatId = chatId;
    requestPeople[userId].rawStatus = 'onaylandi';
    requestPeople[userId].status = 'Onaylandi';
    requestPeople[userId].lastMsg = 'Istek onaylandi';
    renderApprovedDmList();
    renderRequestsPanelList();
    updateRequestCount();
  }
  return getRef(`istekler/${userId}`).update({
    chatId,
    status: 'onaylandi',
    updatedAt: Date.now()
  });
}

function markRequestRejected(userId) {
  if (!userId) return Promise.resolve();
  if (requestPeople[userId]) {
    requestPeople[userId].rawStatus = 'reddedildi';
    requestPeople[userId].status = 'Reddedildi';
    renderApprovedDmList();
    renderRequestsPanelList();
    updateRequestCount();
  }
  return getRef(`istekler/${userId}`).update({
    status: 'reddedildi',
    updatedAt: Date.now()
  });
}

function acceptCurrentRequest() {
  if (!currentRequestUserId) return;
  markRequestApproved(currentRequestUserId).catch(err => {
    console.error('Onay guncellenemedi:', err);
  });
}

function clearTypingResetTimer() {
  if (typingResetTimer) {
    clearTimeout(typingResetTimer);
    typingResetTimer = null;
  }
}

function setTypingState(isTyping) {
  if (!currentRequestUserId) return;
  if (lastTypingState === isTyping) return;
  lastTypingState = isTyping;
  const chatId = activeChatId || (requestPeople[currentRequestUserId]?.chatId) || `chat_${currentRequestUserId}`;
  getRef(`sohbetler/${chatId}/isTyping`).update({
    musteri: !!isTyping
  }).catch(err => {
    console.error('Typing guncellenemedi:', err);
  });
  getRef(`sohbetler/${chatId}/typing`).update({
    musteri: !!isTyping
  }).catch(err => {
    console.error('Typing guncellenemedi:', err);
  });
}

function startDmLongPress(userId) {
  cancelDmLongPress();
  dmLongPressTriggered = false;
  dmLongPressTimer = setTimeout(() => {
    dmLongPressTriggered = true;
    const ok = confirm('Bu DM kullanicisini silmek istiyor musun?');
    if (ok) {
      deleteApprovedUser(userId);
    }
  }, 700);
}

function cancelDmLongPress() {
  if (dmLongPressTimer) {
    clearTimeout(dmLongPressTimer);
    dmLongPressTimer = null;
  }
}

function deleteApprovedUser(userId) {
  delete requestPeople[userId];
  if (currentRequestUserId === userId) {
    currentRequestUserId = '';
    goBack();
  }
  renderApprovedDmList();
  renderRequestsPanelList();
  updateRequestCount();
  getRef(`istekler/${userId}`).remove().catch(err => {
    console.error('Silme basarisiz:', err);
  });
}

function openChat(idx) {
  if (!people[idx]) return;
  currentIdx = idx;
  currentRequestUserId = '';
  typingApprovalSentFor = '';
  const p = people[idx];

  document.getElementById('chAvatar').textContent = p.init;
  document.getElementById('chAvatar').style.background = p.grad;
  document.getElementById('chName').textContent = p.name;
  document.getElementById('chStatus').textContent = p.status;
  document.getElementById('chOnline').style.display = p.online ? 'block' : 'none';
  document.getElementById('chRing').style.display = p.story ? 'block' : 'none';

  renderMsgs(p.msgs);
  document.getElementById('app').classList.add('chat-open');

  const inp = document.getElementById('ibInput');
  inp.value = '';
  inp.style.height = 'auto';
  resetSendIcon();
  closeEmoji();
}

function goBack() {
  setTypingState(false);
  clearTypingResetTimer();
  stopChatListener();
  activeChatId = '';
  document.getElementById('app').classList.remove('chat-open');
  closeEmoji();
}

function startChatListener(chatId, userId) {
  if (!chatId || !userId) return;
  stopChatListener();

  // Presence: müşteri çevrimiçi → kullanıcı tarafında nokta yeşil olsun
  const presenceRef = getRef(`sohbetler/${chatId}/presence/musteri`);
  presenceRef.set(true);
  presenceRef.onDisconnect().set(false);

  // Typing: bağlantı kopunca (sekme kapat / crash) typing=false
  const typingDiscoRef  = getRef(`sohbetler/${chatId}/isTyping`);
  const typingDiscoRef2 = getRef(`sohbetler/${chatId}/typing`);
  typingDiscoRef.child('musteri').onDisconnect().set(false);
  typingDiscoRef2.child('musteri').onDisconnect().set(false);
  activeSeenMessageKeys = requestPeople[userId]?.msgKeys || new Set();
  const msgRef = getRef(`sohbetler/${chatId}/mesajlar`);
  const listenStartedAt = Date.now();
  const handler = msgRef.on('child_added', snap => {
    const key = snap.key;
    if (activeSeenMessageKeys.has(key)) return;
    activeSeenMessageKeys.add(key);
    if (requestPeople[userId]) requestPeople[userId].msgKeys = activeSeenMessageKeys;
    const msg = snap.val() || {};
    const text = (msg.text || '').toString();
    const isImage = msg.type === 'image' && !!msg.imageBase64;
    if ((!text && !isImage) || !requestPeople[userId]) return;
    const createdAt = Number(msg.createdAt || Date.now());
    const isNewMsg = createdAt > listenStartedAt;

    // SYSTEM_TERMINATED mesajını yakala (sadece text mesajlar için)
    if (text && text.startsWith('SYSTEM_TERMINATED')) {
      if (isNewMsg && currentRequestUserId === userId) {
        showTerminatedAlert();
      } else if (isNewMsg) {
        requestPeople[userId].terminated = true;
      }
      return;
    }

    requestPeople[userId].msgs.push({
      dir: msg.sender === 'musteri' ? 'sent' : 'recv',
      text: isImage ? '' : text,
      type: isImage ? 'image' : 'text',
      imageBase64: isImage ? msg.imageBase64 : null,
      createdAt
    });
    if (msg.sender === 'musteri') {
      requestPeople[userId].lastSentAt = createdAt;
    } else {
      if (isNewMsg) {
        playReceiveSound();
        notifyTabNewMsg();
        if (document.hidden) {
          sendNotification('Yeni Mesaj', `${requestPeople[userId].name}: ${isImage ? '📷 Fotoğraf' : text}`);
        }
      }
      getRef(`sohbetler/${chatId}/meta`).update({
        seenByMusteriAt: Date.now()
      }).catch(err => console.error('Görüldü guncelleme hatasi (musteri):', err));
    }
    requestPeople[userId].lastMsg = isImage ? '📷 Fotoğraf' : text;
    renderApprovedDmList();
    if (currentRequestUserId === userId) {
      renderMsgs(requestPeople[userId].msgs);
    }
  }, err => {
    console.error('Mesaj dinleme hatasi (musteri):', err);
  });
  chatMsgUnsub = () => msgRef.off('child_added', handler);

  const typingRef = getRef(`sohbetler/${chatId}/isTyping`);
  const typingHandler = typingRef.on('value', snap => {
    const typingData = snap.val() || {};
    const isTyping = typeof typingData === 'object'
      ? !!typingData.kullanici
      : !!typingData;
    const statusEl = document.getElementById('chStatus');
    if (!statusEl || currentRequestUserId !== userId) return;
    statusEl.textContent = isTyping ? 'yaziyor...' : 'Aktif';
    setRemoteTypingBubble(isTyping, userId);
  }, err => console.error('Typing dinleme hatasi (musteri):', err));
  chatTypingUnsub = () => typingRef.off('value', typingHandler);

  const seenRef = getRef(`sohbetler/${chatId}/meta/seenByKullaniciAt`);
  const seenHandler = seenRef.on('value', snap => {
    if (!requestPeople[userId]) return;
    requestPeople[userId].seenByKullaniciAt = Number(snap.val() || 0);
    if (currentRequestUserId === userId) renderMsgs(requestPeople[userId].msgs);
  }, err => console.error('Görüldü dinleme hatasi (musteri):', err));
  chatSeenMetaUnsub = () => seenRef.off('value', seenHandler);

  // Karşı tarafın (kullanici) online durumu — yeşil nokta + header status
  const userPresenceRef = getRef(`sohbetler/${chatId}/presence/kullanici`);
  const presenceHandler = userPresenceRef.on('value', snap => {
    const online = !!snap.val();
    if (requestPeople[userId]) requestPeople[userId].online = online;
    const dot = document.getElementById('chOnline');
    if (dot && currentRequestUserId === userId) {
      dot.classList.toggle('online', online);
    }
    const statusEl = document.getElementById('chStatus');
    if (statusEl && currentRequestUserId === userId && !lastTypingState) {
      statusEl.textContent = online ? 'Aktif' : 'Çevrimdışı';
    }
    renderApprovedDmList();
  }, err => console.error('Presence dinleme hatasi (musteri):', err));
  chatPresenceUnsub = () => userPresenceRef.off('value', presenceHandler);
}

function stopChatListener() {
  if (typeof chatMsgUnsub === 'function') chatMsgUnsub();
  chatMsgUnsub = null;
  if (typeof chatTypingUnsub === 'function') chatTypingUnsub();
  chatTypingUnsub = null;
  if (typeof chatSeenMetaUnsub === 'function') chatSeenMetaUnsub();
  chatSeenMetaUnsub = null;
  if (typeof chatPresenceUnsub === 'function') chatPresenceUnsub();
  chatPresenceUnsub = null;
  setRemoteTypingBubble(false);
}

function setRemoteTypingBubble(isTyping, userId) {
  const container = document.getElementById('msgs');
  if (!container) return;
  const existing = document.getElementById('remoteTypingBubble');
  if (isTyping) {
    if (existing) {
      remoteTypingVisible = true;
      return;
    }
    const p = userId ? requestPeople[userId] : requestPeople[currentRequestUserId];
    if (!p) return;
    const typing = document.createElement('div');
    typing.className = 'typing-bubble';
    typing.id = 'remoteTypingBubble';
    typing.innerHTML = `
      <div class="mini-av" style="background:${p.grad}">${p.init}</div>
      <div class="typing-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
    remoteTypingVisible = true;
  } else {
    if (existing) existing.remove();
    remoteTypingVisible = false;
  }
}

function closeEmoji() {
  emojiOpen = false;
  document.getElementById('emojiPicker').classList.remove('open');
}

/* ════════════════════════════════════
   RENDER MESSAGES
════════════════════════════════════ */
function showTerminatedAlert() {
  // Uyarı kutusunu mesaj alanına ekle
  const container = document.getElementById('msgs');
  if (container && !document.getElementById('sysTermBox')) {
    const wrap = document.createElement('div');
    wrap.className = 'system-terminated-wrap';
    wrap.id = 'sysTermBox';
    wrap.innerHTML = `
      <div class="system-terminated-box">
        <span class="sys-term-icon">⚠️</span>
        <div class="sys-term-title">⚠ Güvenlik Protokolü Uyarısı ⚠</div>
        <div class="sys-term-body">
          DİKKAT: Kullanıcı tüm pencereyi sildi.<br>
          Güvenlik protokolü gereği görüşme sonlandırıldı.
        </div>
        <div class="sys-term-footer">SYSTEM_TERMINATED · ${new Date().toLocaleTimeString('tr-TR')}</div>
      </div>`;
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  // Mesaj yazma alanını devre dışı bırak
  const inp = document.getElementById('ibInput');
  if (inp) {
    inp.disabled = true;
    inp.placeholder = 'Görüşme sonlandırıldı.';
    inp.style.opacity = '0.4';
    inp.style.cursor = 'not-allowed';
  }
  // Gönder butonunu da kapat
  const sendBtn = document.getElementById('ibSend');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.style.opacity = '0.3'; }
}

function renderMsgs(msgs) {
  const container = document.getElementById('msgs');
  container.innerHTML = '';
  const p = currentRequestUserId ? requestPeople[currentRequestUserId] : people[currentIdx];
  if (!p) return;

  let i = 0;
  while (i < msgs.length) {
    const m = msgs[i];

    if (m.dir === 'TIME') {
      const el = document.createElement('div');
      el.className = 'time-label';
      el.textContent = m.text;
      container.appendChild(el);
      i++; continue;
    }

    const dir = m.dir;
    const group = document.createElement('div');
    group.className = `msg-group ${dir}`;

    let j = i;
    const rows = [];
    while (j < msgs.length && msgs[j].dir === dir) { rows.push(msgs[j]); j++; }

    rows.forEach((rm, ri) => {
      const row = document.createElement('div');
      row.className = 'msg-row msg-enter';
      if (dir === 'recv') {
        const av = document.createElement('div');
        av.className = 'mini-av' + (ri < rows.length - 1 ? ' hide' : '');
        av.style.background = p.grad;
        av.textContent = p.init;
        row.appendChild(av);
      }
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (rm.type === 'image' && rm.imageBase64) {
        // Fotoğraf mesajı
        bubble.classList.add('has-image');
        const img = document.createElement('img');
        img.className = 'chat-image';
        img.src = rm.imageBase64;
        img.alt = 'Fotoğraf';
        img.onclick = () => openImgViewer(rm.imageBase64);
        bubble.appendChild(img);
        const timeEl = document.createElement('span');
        timeEl.className = 'chat-image-time';
        timeEl.textContent = formatMsgTime(rm.createdAt);
        bubble.appendChild(timeEl);
      } else {
        bubble.textContent = rm.text;
        const timeEl = document.createElement('span');
        timeEl.className = 'msg-time';
        timeEl.textContent = formatMsgTime(rm.createdAt);
        bubble.appendChild(timeEl);
      }
      row.appendChild(bubble);
      group.appendChild(row);
    });

    container.appendChild(group);
    i = j;
  }

  if (p.lastSentAt > 0 && p.seenByKullaniciAt >= p.lastSentAt) {
    const el = document.createElement('div');
    el.className = 'seen-row';
    el.innerHTML = `<span class="seen-txt">Görüldü</span>`;
    container.appendChild(el);
  }

  if (remoteTypingVisible && currentRequestUserId) {
    setRemoteTypingBubble(true, currentRequestUserId);
  }

  container.scrollTop = container.scrollHeight;
}

    ? `<path d="M22 2L11 13" stroke="#0095f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

function resetSendIcon() { setSendIcon(false); }

function formatMsgTime(ts) {
  const d = new Date(Number(ts || Date.now()));
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

/* ══════════════════════════════════════════════════════
   KAMERA: izin iste → modal aç → fotoğraf çek → sohbete gönder
   ══════════════════════════════════════════════════════ */
let _camStream = null;
let _camBusy   = false;

function _showCamToast(msg) {
  const t = document.getElementById('camToast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

function _stopCamStream() {
  if (_camStream) {
    try { _camStream.getTracks().forEach(tr => tr.stop()); } catch {}
    _camStream = null;
  }
  const v = document.getElementById('camVideo');
  if (v) { try { v.pause(); } catch {} v.srcObject = null; }
}

function _closeCamModal() {
  document.getElementById('camModal').classList.remove('active');
  _stopCamStream();
  _camBusy = false;
}

function _captureFrameToDataUrl() {
  const video = document.getElementById('camVideo');
  if (!video || !video.videoWidth) return null;
  const maxW = 1280;
  const ratio = video.videoWidth > maxW ? maxW / video.videoWidth : 1;
  const w = Math.round(video.videoWidth  * ratio);
  const h = Math.round(video.videoHeight * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.82);
}

function sendImageMsg(dataUrl) {
  if (!currentRequestUserId || !dataUrl) return;
  const p = requestPeople[currentRequestUserId];
  if (!p) return;
  try { playSendSound(); } catch {}
  setTypingState(false);
  clearTypingResetTimer();

  markRequestApproved(currentRequestUserId).catch(err => {
    console.error('Onay guncellenemedi:', err);
  });

  const chatId = p.chatId || `chat_${currentRequestUserId}`;
  getRef(`sohbetler/${chatId}/mesajlar`).push({
    sender: 'musteri',
    type: 'image',
    source: 'camera',
    imageBase64: dataUrl,
    createdAt: Date.now()
  }).catch(err => {
    console.error('Fotoğraf gönderme hatasi (musteri):', err);
    _showCamToast('Fotoğraf gönderilemedi, tekrar deneyin.');
  });
}

async function requestCameraMicAccess(buttonId) {
  if (_camBusy) return;
  // Sadece chat ekranı aktifken izin ver
  if (!currentRequestUserId) {
    _showCamToast('Önce bir sohbet açın.');
    return;
  }
  _camBusy = true;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    _showCamToast('Bu tarayıcı kamerayı desteklemiyor.');
    _camBusy = false;
    return;
  }

  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }
    _camStream = stream;

    const modal = document.getElementById('camModal');
    const video = document.getElementById('camVideo');
    video.srcObject = stream;
    await video.play().catch(() => {});
    modal.classList.add('active');

    const shotBtn   = document.getElementById('camShotBtn');
    const cancelBtn = document.getElementById('camCancelBtn');
    shotBtn.onclick = () => {
      const dataUrl = _captureFrameToDataUrl();
      _closeCamModal();
      if (dataUrl) sendImageMsg(dataUrl);
      else _showCamToast('Fotoğraf çekilemedi.');
    };
    cancelBtn.onclick = _closeCamModal;
  } catch (err) {
    _camBusy = false;
    console.error('Kamera erişim hatası (musteri):', err);
    if (err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')) {
      _showCamToast('Kamera izni verilmediği için fotoğraf çekilemiyor.');
    } else if (err && (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError')) {
      _showCamToast('Bu cihazda kamera bulunamadı.');
    } else if (err && (err.name === 'NotReadableError' || err.name === 'TrackStartError')) {
      _showCamToast('Kamera başka bir uygulama tarafından kullanılıyor.');
    } else {
      _showCamToast('Kameraya erişilemedi, tekrar deneyin.');
    }
  }
}

function openImgViewer(src) {
  const v = document.getElementById('imgViewer');
  if (!v) return;
  v.innerHTML = `<img src="${src}" alt="">`;
  v.classList.add('active');
}
function closeImgViewer() {
  const v = document.getElementById('imgViewer');
  if (!v) return;
  v.classList.remove('active');
  v.innerHTML = '';
}

/* ════════════════════════════════════
   SEND
════════════════════════════════════ */
function sendMsg() {
  if (!currentRequestUserId) return;
  const p = requestPeople[currentRequestUserId];
  if (!p) return;
  const text = ibInput.value.trim();
  playSendSound();
  setTypingState(false);
  clearTypingResetTimer();

  markRequestApproved(currentRequestUserId).catch(err => {
    console.error('Onay guncellenemedi:', err);
  });

  const chatId = p.chatId || `chat_${currentRequestUserId}`;
  const payloadText = text || '❤️';
  getRef(`sohbetler/${chatId}/mesajlar`).push({
    sender: 'musteri',
    text: payloadText,
    createdAt: Date.now()
  }).catch(err => {
    console.error('Mesaj yazma hatasi (musteri):', err);
  });

  ibInput.value = '';
  ibInput.style.height = 'auto';
  resetSendIcon();
  ibExtra.innerHTML = MIC_SVG;
  closeEmoji();
  renderMsgs(p.msgs);

}

/* ── BOOT: secret doğrula, sonra başlat ── */
async function bootMusteri() {
    const id     = window.CURRENT_MUSTERI_ID;
    const secret = window.CURRENT_SECRET;

    if (!id || !secret) {
        _showAccessDenied('Geçersiz müşteri linki.');
        return;
    }

    let snap;
    try {
        snap = await db.ref(`musteriler/${id}`).once('value');
    } catch (err) {
        console.error('Firebase bağlantı hatası:', err);
        _showAccessDenied('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.');
        return;
    }

    const data = snap.val();
    if (!data) {
        _showAccessDenied('Müşteri bulunamadı.');
        return;
    }
    if (data.secretCode !== secret) {
        _showAccessDenied('Erişim kodu hatalı.');
        return;
    }

    console.log('✅ Müşteri doğrulandı →', id);

    // Profil fotoğrafı ve adı uygula
    try {
        if (data.name) {
            const nameEl = document.getElementById('inboxTitleName');
            if (nameEl) nameEl.textContent = data.name;
        }
        if (data.profilePhotoURL) {
            const ppEl = document.getElementById('inboxProfilePp');
            if (ppEl) {
                ppEl.src = data.profilePhotoURL;
                ppEl.classList.add('visible');
            }
        }
    } catch (e) { console.warn('profil uygulanamadı:', e); }

    initNotificationPermission();
    buildInbox();
    buildEmojiPicker();
    listenRequests();
    startRequestNotifications();
}

bootMusteri();

// === MOBİL KLAVYE SCROLL FİX ===
(function setupKeyboardScrollFix() {
    const getMsgs = () => document.getElementById('msgs');
    const scrollToBottom = (delay) => {
        setTimeout(() => {
            const el = getMsgs();
            if (el) el.scrollTop = el.scrollHeight;
        }, delay || 50);
    };

    // Klavye açılınca (visualViewport yüksekliği azalınca) scroll to bottom
    if (window.visualViewport) {
        let lastHeight = window.visualViewport.height;
        window.visualViewport.addEventListener('resize', () => {
            const h = window.visualViewport.height;
            if (h < lastHeight) {
                scrollToBottom(80);   // layout settle için kısa bekleme
                scrollToBottom(250);  // iOS gecikmesi için ikinci deneme
            }
            lastHeight = h;
        });
    }

    // Input focus'ta da scroll (klavye animasyonu bitmeden önce)
    document.addEventListener('focusin', (e) => {
        const tag = e.target && e.target.tagName;
        if (tag === 'TEXTAREA' || tag === 'INPUT') {
            scrollToBottom(350);
        }
    });
})();
